<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compass Composer · Armonía Ilustrada</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f12;
    color: #e8e4d9;
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
  }

  ::-webkit-scrollbar { height: 4px; width: 4px; background: #1a1a1f; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

  button { cursor: pointer; font-family: 'Lato', sans-serif; transition: filter 0.15s; }
  button:hover { filter: brightness(1.18); }

  .serif { font-family: 'Playfair Display', serif; }

  /* ── Layout ── */
  .container { max-width: 900px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 28px; }
  .header .sub { font-size: 11px; letter-spacing: 4px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 400; color: #e8e4d9; }

  /* ── Card ── */
  .card {
    background: #1a1a1f;
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 16px;
  }
  .card-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── Controls row ── */
  .controls-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }

  /* ── Tonic grid ── */
  .tonic-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .tonic-btn {
    background: #2a2a30;
    border: none;
    border-radius: 6px;
    padding: 6px 4px;
    color: #ccc;
    font-size: 11px;
  }
  .tonic-btn.active {
    color: #111;
    font-weight: 700;
  }

  /* ── Mode buttons ── */
  .mode-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .mode-btn {
    background: #2a2a30;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    color: #ccc;
    font-size: 12px;
    text-align: left;
  }
  .mode-btn.active {
    color: #111;
    font-weight: 700;
  }

  /* ── Fretboard ── */
  .fretboard-wrap { overflow-x: auto; padding: 8px 0; }
  .fretboard-wrap svg { display: block; margin: 0 auto; }
  .fret-note { cursor: pointer; }

  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #aaa;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Scale degrees ── */
  .scale-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chord-pill {
    border-radius: 8px;
    padding: 8px 14px;
    border-width: 1.5px;
    border-style: solid;
    outline: none;
    min-width: 70px;
    background: transparent;
  }
  .chord-pill .pill-name {
    font-size: 18px;
    font-weight: 700;
    font-family: 'Playfair Display', serif;
  }
  .chord-pill .pill-func {
    font-size: 10px;
    margin-top: 2px;
  }

  /* ── Bottom panels ── */
  .panels {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .panel-chord { flex: 1; min-width: 180px; }
  .panel-suggestions { flex: 2; min-width: 220px; }

  .chord-name-display {
    font-size: 24px;
    font-family: 'Playfair Display', serif;
    margin-bottom: 8px;
  }
  .chord-notes-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chord-note-box {
    background: #2a2a30;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
  }
  .chord-note-box .note-interval {
    font-size: 9px;
    color: #666;
    margin-top: 2px;
  }
  .chord-function-label {
    margin-top: 10px;
    font-size: 11px;
  }
  .add-btn {
    margin-top: 12px;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: #111;
    font-weight: 700;
    font-size: 12px;
  }

  /* ── Suggestions ── */
  .suggestion {
    background: #2a2a30;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    border: 1px solid #333;
    transition: border-color 0.15s;
  }
  .suggestion:hover { border-color: #666; }
  .sug-label {
    font-size: 13px;
    color: #e8e4d9;
    font-weight: 600;
    font-family: 'Playfair Display', serif;
    margin-bottom: 3px;
  }
  .sug-desc { font-size: 11px; color: #888; }
  .sug-chords {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .sug-chip {
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 10px;
    border-width: 1px;
    border-style: solid;
  }

  /* ── Progression ── */
  .prog-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .clear-btn {
    background: transparent;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 4px 10px;
    color: #888;
    font-size: 11px;
  }
  .prog-empty {
    color: #555;
    font-size: 12px;
    font-style: italic;
  }
  .prog-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .prog-chord-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .prog-chord-box {
    border-radius: 8px;
    padding: 8px 12px;
    text-align: center;
    border-width: 1.5px;
    border-style: solid;
  }
  .prog-chord-name {
    font-size: 16px;
    font-family: 'Playfair Display', serif;
  }
  .prog-chord-func {
    font-size: 9px;
    color: #666;
    margin-top: 1px;
  }
  .prog-arrow { color: #444; font-size: 16px; }

  /* ── Export buttons ── */
  .export-bar {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .export-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    border: 1.5px solid #444;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    background: transparent;
    color: #ccc;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .export-btn:hover { border-color: #aaa; color: #fff; background: #1e1e24; filter: none; }
  .export-btn svg { flex-shrink: 0; }
  .export-btn.copied { border-color: #6dbfa0; color: #6dbfa0; }

  /* ── Tablatura ── */
  .tab-section { margin-top: 16px; }
  .tab-wrap { overflow-x: auto; padding: 8px 0; }
  .tab-pre {
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    line-height: 1.9;
    color: #c8c4b8;
    background: #111115;
    border-radius: 8px;
    padding: 16px 18px;
    white-space: pre;
    display: inline-block;
    min-width: 100%;
  }
  .tab-pre .tab-string-name { color: #666; }
  .tab-pre .tab-chord-name  { color: #888; font-size: 11px; }
  .tab-empty {
    color: #555;
    font-size: 12px;
    font-style: italic;
    margin-top: 8px;
  }
  @media print {
    .tab-pre { background: #f5f5f5; color: #111; border: 1px solid #ccc; }
  }

  @media print {
    body { background: #fff; color: #111; padding: 20px; }
    .no-print { display: none !important; }
    .card { background: #f5f5f5; border: 1px solid #ddd; page-break-inside: avoid; }
    .card-label { color: #555; }
    .print-only { display: block !important; }
    .prog-chord-box { background: #f0f0f0 !important; }
    .prog-chord-name { color: #333 !important; }
    .prog-chord-func { color: #666 !important; }
    .prog-arrow { color: #999 !important; }
    .header .sub { color: #888; }
    .header h1 { color: #111; }
  }
  .print-only { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="sub">Basado en Armonía Ilustrada · Callipari</div>
    <h1>Compass Composer</h1>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <div class="card" style="flex:0 0 auto">
      <div class="card-label">Tónica</div>
      <div class="tonic-grid" id="tonic-grid"></div>
    </div>
    <div class="card" style="flex:0 0 auto">
      <div class="card-label">Modo</div>
      <div class="mode-list" id="mode-list"></div>
    </div>
  </div>

  <!-- Fretboard -->
  <div class="card">
    <div class="card-label" style="padding-left:4px">Diapasón · tocá una nota para cambiar la tónica</div>
    <div class="fretboard-wrap">
      <svg id="fretboard" height="160"></svg>
    </div>
    <div class="legend" id="fret-legend"></div>
  </div>

  <!-- Scale degrees -->
  <div class="card">
    <div class="card-label">Acordes de la escala · seleccioná uno</div>
    <div class="scale-row" id="scale-row"></div>
  </div>

  <!-- Panels -->
  <div class="panels">
    <div class="card panel-chord" id="panel-chord"></div>
    <div class="card panel-suggestions" id="panel-suggestions"></div>
  </div>

  <!-- Export bar -->
  <div class="export-bar no-print">
    <button class="export-btn" id="btn-copy" onclick="copyCifrado()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copiar cifrado
    </button>
    <button class="export-btn" onclick="exportPDF()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      Descargar PDF
    </button>
  </div>

  <!-- Progression -->
  <div class="card" id="panel-progression"></div>

  <!-- Tablatura -->
  <div class="card tab-section" id="panel-tab">
    <div class="card-label">Tablatura de guitarra</div>
    <div class="tab-empty">Armá una progresión para ver la tablatura...</div>
  </div>
</div>

<script>
// ── Music Theory ─────────────────────────────────────────────────────────────
const NOTES       = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const NOTE_LABELS = ["Do","Do#","Re","Re#","Mi","Fa","Fa#","Sol","Sol#","La","La#","Si"];

const MODES = {
  mayor:          { label:"Mayor",          intervals:[0,2,4,5,7,9,11], chordTypes:["M","m","m","M","M","m","dim"], functions:["T","SD","T","SD","D","T","D"],  color:"#e8b86d" },
  menor_natural:  { label:"Menor Natural",  intervals:[0,2,3,5,7,8,10], chordTypes:["m","dim","M","m","m","M","M"], functions:["T","SD","T","SD","D","SD","D"], color:"#7eb8d4" },
  menor_armonico: { label:"Menor Armónico", intervals:[0,2,3,5,7,8,11], chordTypes:["m","dim","M","m","M","M","dim"],functions:["T","SD","T","SD","D","SD","D"], color:"#a78bca" },
  dorico:         { label:"Dórico",         intervals:[0,2,3,5,7,9,10], chordTypes:["m","m","M","M","m","dim","M"], functions:["T","SD","T","SD","D","SD","T"], color:"#6dbfa0" },
  frigio:         { label:"Frigio",         intervals:[0,1,3,5,7,8,10], chordTypes:["m","M","M","m","dim","M","m"], functions:["T","SD","T","SD","D","SD","T"], color:"#e07b7b" },
};

const FUNC_LABELS = { T:"Tónica", SD:"Subdominante", D:"Dominante" };
const FUNC_COLORS = { T:"#6dbfa0", SD:"#e8b86d", D:"#e07b7b" };

const TRIAD = { M:[0,4,7], m:[0,3,7], dim:[0,3,6] };
const STRING_TUNING = [4,11,7,2,9,4]; // EADGBE
const FRETS = 13;

function getNote(root, s)    { return NOTES[(NOTES.indexOf(root)+s)%12]; }
function getScale(root, mode){ return MODES[mode].intervals.map(i=>getNote(root,i)); }
function buildChord(root,t)  { return TRIAD[t].map(i=>getNote(root,i)); }
function chordLabel(root,type){
  return NOTE_LABELS[NOTES.indexOf(root)] + (type==="m"?"m":type==="dim"?"°":"");
}

function getSuggestions(degIdx, mode) {
  const fn = MODES[mode].functions[degIdx];
  return ({
    T:  [{ degrees:[3,4], label:"T → SD → D",    desc:"Movimiento cadencial clásico" },
         { degrees:[5,4], label:"T → T → D",      desc:"Refuerzo tónico" },
         { degrees:[1,4], label:"T → SD → D",     desc:"Subdominante menor" }],
    SD: [{ degrees:[4],   label:"SD → D",         desc:"Resolución dominante" },
         { degrees:[0],   label:"SD → T",         desc:"Cadencia plagal" },
         { degrees:[4,0], label:"SD → D → T",     desc:"Cadencia perfecta" }],
    D:  [{ degrees:[0],   label:"D → T",          desc:"Resolución tónica (cadencia auténtica)" },
         { degrees:[5],   label:"D → T relativa", desc:"Resolución engañosa" },
         { degrees:[3,0], label:"D → SD → T",     desc:"Cadencia con retardo" }],
  })[fn] || [];
}

// ── State ────────────────────────────────────────────────────────────────────
let state = {
  root: "C",
  mode: "mayor",
  selectedDegree: 0,
  progression: [],
};

// ── Render helpers ───────────────────────────────────────────────────────────
function hex(color, alpha) {
  // append 2-digit hex alpha to a 6-digit hex color
  const a = Math.round(alpha*255).toString(16).padStart(2,"0");
  return color + a;
}

function renderTonicGrid() {
  const g = document.getElementById("tonic-grid");
  const mColor = MODES[state.mode].color;
  g.innerHTML = NOTES.map((n,i)=>`
    <button class="tonic-btn${state.root===n?" active":""}"
      style="${state.root===n?`background:${mColor}`:"background:#2a2a30"}"
      onclick="selectRoot('${n}')">${NOTE_LABELS[i]}</button>
  `).join("");
}

function renderModeList() {
  const el = document.getElementById("mode-list");
  el.innerHTML = Object.entries(MODES).map(([key,m])=>`
    <button class="mode-btn${state.mode===key?" active":""}"
      style="${state.mode===key?`background:${m.color}`:"background:#2a2a30"}"
      onclick="selectMode('${key}')">${m.label}</button>
  `).join("");
}

function renderFretboard() {
  const svg = document.getElementById("fretboard");
  const W = FRETS*44+60;
  svg.setAttribute("width", W);
  const scale = getScale(state.root, state.mode);
  const mData = MODES[state.mode];
  let html = "";

  // Nut
  html += `<rect x="40" y="20" width="4" height="120" fill="#c8a97e" rx="2"/>`;

  // Strings
  STRING_TUNING.forEach((_,si)=>{
    const sw = si<2?2:1.2;
    html += `<line x1="40" y1="${30+si*22}" x2="${40+FRETS*44}" y2="${30+si*22}" stroke="#888" stroke-width="${sw}"/>`;
  });

  // Fret lines
  for(let fi=1;fi<=FRETS;fi++){
    html += `<line x1="${40+fi*44}" y1="20" x2="${40+fi*44}" y2="140" stroke="#444" stroke-width="1"/>`;
  }

  // Fret markers
  [3,5,7,9,12].forEach(f=>{
    html += `<circle cx="${40+(f-0.5)*44}" cy="150" r="4" fill="#555"/>`;
  });

  // Notes
  STRING_TUNING.forEach((openNote,si)=>{
    for(let fi=0;fi<=FRETS;fi++){
      const noteIdx = (openNote+fi)%12;
      const note    = NOTES[noteIdx];
      const degIdx  = scale.indexOf(note);
      const inScale = degIdx!==-1;
      const isRoot  = note===state.root;
      const fn      = inScale ? mData.functions[degIdx] : null;
      const cx      = fi===0 ? 20 : 40+(fi-0.5)*44;
      const cy      = 30+si*22;
      const fill    = isRoot ? mData.color : inScale ? hex(FUNC_COLORS[fn],0.8) : "transparent";
      const stroke  = isRoot ? "#fff" : "transparent";
      const fw      = isRoot ? "bold" : "normal";
      const fs      = inScale ? 8 : 7;
      const tc      = inScale ? "#111" : "#444";

      if(inScale){
        html += `<circle cx="${cx}" cy="${cy}" r="10" fill="${fill}" stroke="${stroke}" stroke-width="2" class="fret-note" onclick="selectRoot('${note}')" style="cursor:pointer"/>`;
      }
      html += `<text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="${fs}" fill="${tc}" font-weight="${fw}" font-family="Lato,sans-serif" style="pointer-events:none;user-select:none">${NOTE_LABELS[noteIdx]}</text>`;
    }
  });

  svg.innerHTML = html;

  // Legend
  const leg = document.getElementById("fret-legend");
  const mColor = MODES[state.mode].color;
  leg.innerHTML = Object.entries(FUNC_COLORS).map(([fn,c])=>`
    <div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${FUNC_LABELS[fn]}</div>
  `).join("") + `<div class="legend-item"><div class="legend-dot" style="background:${mColor};border:2px solid #fff"></div>Tónica seleccionada</div>`;
}

function renderScaleRow() {
  const el  = document.getElementById("scale-row");
  const mD  = MODES[state.mode];
  const sc  = getScale(state.root, state.mode);
  el.innerHTML = sc.map((r,i)=>{
    const t  = mD.chordTypes[i];
    const fn = mD.functions[i];
    const c  = FUNC_COLORS[fn];
    const sel= state.selectedDegree===i;
    const bg = sel ? c : hex(c,0.13);
    const tc = sel ? "#111" : c;
    return `<button class="chord-pill" style="border-color:${c};background:${bg}" onclick="selectDegree(${i})">
      <div class="pill-name" style="color:${tc}">${chordLabel(r,t)}</div>
      <div class="pill-func" style="color:${sel?"#333":c+"99"}">${FUNC_LABELS[fn]}</div>
    </button>`;
  }).join("");
}

function renderChordPanel() {
  const el   = document.getElementById("panel-chord");
  const mD   = MODES[state.mode];
  const sc   = getScale(state.root, state.mode);
  const sR   = sc[state.selectedDegree];
  const sT   = mD.chordTypes[state.selectedDegree];
  const sFn  = mD.functions[state.selectedDegree];
  const notes= buildChord(sR, sT);
  const intervals = ["Fundamental","Tercera","Quinta"];

  el.innerHTML = `
    <div class="card-label">Acorde seleccionado</div>
    <div class="chord-name-display serif" style="color:${mD.color}">${chordLabel(sR,sT)}</div>
    <div class="chord-notes-row">
      ${notes.map((n,i)=>`
        <div class="chord-note-box" style="color:${i===0?mD.color:"#ccc"};font-weight:${i===0?700:400}">
          ${NOTE_LABELS[NOTES.indexOf(n)]}
          <div class="note-interval">${intervals[i]}</div>
        </div>
      `).join("")}
    </div>
    <div class="chord-function-label" style="color:${FUNC_COLORS[sFn]}">Función: ${FUNC_LABELS[sFn]}</div>
    <button class="add-btn" style="background:${mD.color}" onclick="addDegree(${state.selectedDegree})">+ Agregar a progresión</button>
  `;
}

function renderSuggestions() {
  const el  = document.getElementById("panel-suggestions");
  const mD  = MODES[state.mode];
  const sc  = getScale(state.root, state.mode);
  const sug = getSuggestions(state.selectedDegree, state.mode);
  const dIdx= state.selectedDegree;

  const chips = (degs) => [dIdx,...degs].map(d=>{
    const r=sc[d], t=mD.chordTypes[d], fn=mD.functions[d], c=FUNC_COLORS[fn];
    return `<span class="sug-chip" style="color:${c};border-color:${c};background:${hex(c,0.2)}">${chordLabel(r,t)}</span>`;
  }).join("");

  el.innerHTML = `
    <div class="card-label">Posibilidades armónicas</div>
    ${sug.map((s,i)=>`
      <div class="suggestion" onclick="addSuggestion(${i})">
        <div class="sug-label">${s.label}</div>
        <div class="sug-desc">${s.desc}</div>
        <div class="sug-chords">${chips(s.degrees)}</div>
      </div>
    `).join("")}
  `;
}

function renderProgression() {
  const el  = document.getElementById("panel-progression");
  const prog= state.progression;

  const clearBtn = prog.length>0 ? `<button class="clear-btn" onclick="clearProg()">Limpiar</button>` : "";
  let body = "";

  if(prog.length===0){
    body = `<div class="prog-empty">Seleccioná acordes o hacé click en una progresión sugerida para armarla acá...</div>`;
  } else {
    const items = prog.map((ch,i)=>{
      const c = FUNC_COLORS[ch.func];
      const arrow = i<prog.length-1 ? `<span class="prog-arrow">→</span>` : "";
      return `<div class="prog-chord-item">
        <div class="prog-chord-box" style="border-color:${c};background:${hex(c,0.13)}">
          <div class="prog-chord-name serif" style="color:${c}">${chordLabel(ch.root,ch.type)}</div>
          <div class="prog-chord-func">${FUNC_LABELS[ch.func]}</div>
        </div>${arrow}
      </div>`;
    }).join("");
    body = `<div class="prog-row">${items}</div>`;
  }

  el.innerHTML = `
    <div class="prog-header">
      <div class="card-label" style="margin:0">Progresión armada</div>
      ${clearBtn}
    </div>
    ${body}
  `;
}

function renderAll() {
  renderTonicGrid();
  renderModeList();
  renderFretboard();
  renderScaleRow();
  renderChordPanel();
  renderSuggestions();
  renderProgression();
  renderTab();
}

// ── Actions ──────────────────────────────────────────────────────────────────
function selectRoot(note)  { state.root = note; renderAll(); }
function selectMode(key)   { state.mode = key;  renderAll(); }
function selectDegree(idx) { state.selectedDegree = idx; renderChordPanel(); renderSuggestions(); renderScaleRow(); }

function addDegree(idx) {
  const sc = getScale(state.root, state.mode);
  const mD = MODES[state.mode];
  state.progression.push({ root:sc[idx], type:mD.chordTypes[idx], func:mD.functions[idx] });
  renderProgression();
  renderTab();
}

function addSuggestion(sugIdx) {
  const sug = getSuggestions(state.selectedDegree, state.mode)[sugIdx];
  addDegree(state.selectedDegree);
  sug.degrees.forEach(d=>addDegree(d));
}

function clearProg() { state.progression=[]; renderProgression(); renderTab(); }

// ── Chord Voicings (guitar, standard tuning) ─────────────────────────────────
// Each entry: [e, B, G, D, A, E] (high to low), -1 = mute, 0 = open
// Covers all 12 roots × major, minor, dim
const VOICINGS = {
  // Major
  "C-M":   [0,1,0,2,3,-1], "C#-M":  [4,6,6,6,4,-1], "D-M":   [2,3,2,0,-1,-1],
  "D#-M":  [3,4,3,1,-1,-1],"E-M":   [0,0,1,2,2,0],  "F-M":   [1,1,2,3,3,1],
  "F#-M":  [2,2,3,4,4,2],  "G-M":   [3,0,0,0,2,3],  "G#-M":  [4,4,5,6,6,4],
  "A-M":   [0,2,2,2,0,-1], "A#-M":  [1,3,3,3,1,-1], "B-M":   [2,4,4,4,2,-1],
  // Minor
  "C-m":   [0,1,0,2,3,-1], "C#-m":  [4,5,6,6,4,-1], "D-m":   [1,3,2,0,-1,-1],
  "D#-m":  [2,4,3,1,-1,-1],"E-m":   [0,0,0,2,2,0],  "F-m":   [1,1,1,3,3,1],
  "F#-m":  [2,2,2,4,4,2],  "G-m":   [3,3,3,5,5,3],  "G#-m":  [4,4,4,6,6,4],
  "A-m":   [0,1,2,2,0,-1], "A#-m":  [1,2,3,3,1,-1], "B-m":   [2,3,4,4,2,-1],
  // Diminished
  "C-dim": [-1,2,1,2,3,-1],"C#-dim":[-1,3,2,3,4,-1],"D-dim": [-1,1,2,1,0,-1],
  "D#-dim":[-1,2,3,2,1,-1],"E-dim": [0,2,0,1,2,-1], "F-dim": [1,3,1,2,3,-1],
  "F#-dim":[-1,0,2,0,2,-1],"G-dim": [-1,1,3,1,3,-1],"G#-dim":[-1,2,0,2,0,-1],
  "A-dim": [-1,3,1,3,1,-1],"A#-dim":[-1,1,2,1,2,-1],"B-dim": [-1,2,0,2,0,-1],
};

function getVoicing(root, type) {
  const key = `${root}-${type}`;
  return VOICINGS[key] || [0,0,0,0,0,0];
}

// Build ASCII tablature for the current progression
function buildTab() {
  const prog = state.progression;
  if(prog.length === 0) return null;

  const STRING_NAMES = ["e","B","G","D","A","E"]; // high to low
  const SEP = "---|";
  const PAD = 4; // spacing between chords

  // For each chord, get fret numbers as strings
  const voicings = prog.map(ch => getVoicing(ch.root, ch.type));
  const labels   = prog.map(ch => chordLabel(ch.root, ch.type));

  // Column width = max(fret digits, label length) + padding
  const colWidths = voicings.map((v, ci) => {
    const maxFret = Math.max(...v.map(f => String(f === -1 ? "x" : f).length));
    return Math.max(maxFret, labels[ci].length) + PAD;
  });

  // Build each string line
  const lines = STRING_NAMES.map((name, si) => {
    let line = `${name} |`;
    voicings.forEach((v, ci) => {
      const fret  = v[si];
      const val   = fret === -1 ? "x" : String(fret);
      const width = colWidths[ci];
      // Center the fret value with dashes
      const total = width;
      const left  = Math.floor((total - val.length) / 2);
      const right = total - val.length - left;
      line += "-".repeat(left) + val + "-".repeat(right) + "|";
    });
    return line;
  });

  // Chord name header
  let header = "  ";
  labels.forEach((lbl, ci) => {
    const width = colWidths[ci] + 1; // +1 for the | separator
    const left  = Math.floor((width - lbl.length) / 2);
    const right = width - lbl.length - left;
    header += " ".repeat(left) + lbl + " ".repeat(right);
  });

  // Separator line
  const sepLine = "  " + lines[0].slice(2).replace(/[^|]/g, "-");

  return [header, sepLine, ...lines, sepLine].join("\n");
}

function renderTab() {
  const el   = document.getElementById("panel-tab");
  const text = buildTab();

  if(!text) {
    el.innerHTML = `
      <div class="card-label">Tablatura de guitarra</div>
      <div class="tab-empty">Armá una progresión para ver la tablatura...</div>`;
    return;
  }

  el.innerHTML = `
    <div class="prog-header">
      <div class="card-label" style="margin:0">Tablatura de guitarra</div>
      <button class="export-btn" id="btn-copy-tab" onclick="copyTab()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copiar TAB
      </button>
    </div>
    <div class="tab-wrap"><pre class="tab-pre">${text}</pre></div>`;
}

function copyTab() {
  const text = buildTab();
  if(!text) return;
  const mD  = MODES[state.mode];
  const now = new Date().toLocaleDateString("es-AR", { day:"2-digit", month:"2-digit", year:"numeric" });
  const full = `Compass Composer · ${NOTE_LABELS[NOTES.indexOf(state.root)]} ${mD.label} · ${now}\n\n${text}`;
  navigator.clipboard.writeText(full).then(() => {
    const btn = document.getElementById("btn-copy-tab");
    if(!btn) return;
    const orig = btn.innerHTML;
    btn.classList.add("copied");
    btn.innerHTML = btn.innerHTML.replace("Copiar TAB","¡Copiado!");
    setTimeout(()=>{ btn.classList.remove("copied"); btn.innerHTML = orig; }, 2000);
  });
}

function buildCifradoText() {
  const mD   = MODES[state.mode];
  const prog = state.progression;
  if(prog.length === 0) return null;

  const chords = prog.map(ch => {
    const name = chordLabel(ch.root, ch.type);
    const fn   = FUNC_LABELS[ch.func].toUpperCase();
    return `${name} (${fn})`;
  }).join("  —  ");

  const scale = getScale(state.root, state.mode);
  const scaleStr = scale.map((r,i) => {
    const t = mD.chordTypes[i];
    return chordLabel(r,t);
  }).join(" · ");

  const now = new Date().toLocaleDateString("es-AR", { day:"2-digit", month:"2-digit", year:"numeric" });

  return [
    "╔══════════════════════════════════════════════╗",
    "   COMPASS COMPOSER · Armonía Ilustrada",
    "╚══════════════════════════════════════════════╝",
    "",
    `Tonalidad : ${NOTE_LABELS[NOTES.indexOf(state.root)]} ${mD.label}`,
    `Fecha     : ${now}`,
    "",
    "── ESCALA ─────────────────────────────────────",
    scaleStr,
    "",
    "── PROGRESIÓN ─────────────────────────────────",
    chords,
    "",
    "── NOTAS POR ACORDE ───────────────────────────",
    ...prog.map((ch,i) => {
      const notes = buildChord(ch.root, ch.type).map(n => NOTE_LABELS[NOTES.indexOf(n)]).join(" - ");
      return `  ${i+1}. ${chordLabel(ch.root,ch.type).padEnd(6)} →  ${notes}`;
    }),
  ].join("\n");
}

function copyCifrado() {
  const text = buildCifradoText();
  if(!text) { alert("Agregá al menos un acorde a la progresión primero."); return; }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("btn-copy");
    btn.classList.add("copied");
    btn.innerHTML = btn.innerHTML.replace("Copiar cifrado", "¡Copiado!");
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = btn.innerHTML.replace("¡Copiado!", "Copiar cifrado");
    }, 2000);
  });
}

function exportPDF() {
  if(state.progression.length === 0) { alert("Agregá al menos un acorde a la progresión primero."); return; }
  window.print();
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderAll();
</script>
