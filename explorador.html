<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Explorador · Armonía Funcional</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f12;
    color: #e8e4d9;
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  ::-webkit-scrollbar { height: 4px; width: 4px; background: #1a1a1f; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

  button { cursor: pointer; font-family: 'Lato', sans-serif; transition: filter 0.15s; border: none; }
  button:hover { filter: brightness(1.18); }
  .serif { font-family: 'Playfair Display', serif; }

  .container { max-width: 900px; margin: 0 auto; }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 28px; }
  .header .sub { font-size: 11px; letter-spacing: 4px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 400; color: #e8e4d9; }
  .nav-link {
    display: inline-flex; align-items: center; gap: 6px;
    background: #1a1a1f; border: 1px solid #2a2a35;
    border-radius: 8px; padding: 6px 14px;
    font-size: 12px; color: #888; text-decoration: none;
    margin-top: 10px; transition: border-color 0.15s;
  }
  .nav-link:hover { border-color: #555; color: #ccc; }
  .nav-link strong { color: #ccc; }

  /* ── Card ── */
  .card { background: #1a1a1f; border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; }
  .card-label { font-size: 10px; letter-spacing: 2px; color: #666; text-transform: uppercase; margin-bottom: 10px; }

  /* ── Controls ── */
  .controls-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }

  .tonic-wrap { display: flex; align-items: center; gap: 10px; }
  .tonic-arrow {
    background: #2a2a30; border-radius: 6px;
    padding: 8px 12px; font-size: 14px; color: #aaa;
    border: 1.5px solid #3a3a42;
  }
  .tonic-display {
    min-width: 72px; text-align: center;
    background: #2a2a30; border-radius: 8px;
    padding: 8px 16px; border: 1.5px solid #3a3a42;
  }
  .tonic-display .tonic-note {
    font-family: 'Playfair Display', serif;
    font-size: 26px; font-weight: 700;
  }
  .tonic-display .tonic-label { font-size: 9px; letter-spacing: 2px; color: #666; text-transform: uppercase; }

  /* ── Tabs ── */
  .tabs {
    display: flex; border-radius: 10px; overflow: hidden;
    border: 1.5px solid #2a2a30; margin-bottom: 16px;
  }
  .tab-btn {
    flex: 1; padding: 10px 0; font-size: 12px; font-weight: 600;
    background: #1a1a1f; color: #555; transition: all 0.15s;
    border: none;
  }
  .tab-btn.active { background: #2a2a30; color: #e8e4d9; }

  /* ── Instrument bar ── */
  .inst-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .inst-btn {
    background: #2a2a30; border-radius: 8px;
    padding: 7px 14px; color: #888; font-size: 12px; font-weight: 600;
    border: 1.5px solid transparent; transition: all 0.15s;
  }
  .inst-btn.active { color: #111; font-weight: 700; }

  /* ── Progressions ── */
  .prog-tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .prog-tab {
    background: #1a1a1f; border-radius: 6px;
    padding: 6px 12px; font-size: 11px; color: #555;
    border: 1.5px solid #2a2a30; transition: all 0.15s;
  }
  .prog-tab.active { background: #2a2a30; color: #e8e4d9; border-color: #3a3a42; }

  .prog-book {
    background: #111115; border-left: 2px solid #3a3a42;
    border-radius: 0 8px 8px 0; padding: 12px 14px;
    font-size: 13px; color: #888; line-height: 1.65;
    margin-bottom: 12px;
  }
  .prog-book .tip { color: #666; font-style: italic; }

  /* ── Chord cards ── */
  .chord-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 12px; }
  .chord-card {
    border-radius: 10px; padding: 10px 12px;
    text-align: center; cursor: pointer;
    min-width: 82px; transition: all 0.15s;
    border: 1.5px solid #2a2a30; background: #111115;
  }
  .chord-card.active { box-shadow: 0 0 16px rgba(0,0,0,0.4); }
  .chord-card .cc-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 2px; color: #e8e4d9; }
  .chord-card .cc-roman { font-size: 10px; color: #555; margin-bottom: 3px; }
  .chord-card .cc-notes { font-size: 10px; color: #444; margin-bottom: 5px; }
  .chord-card .cc-fn { font-size: 10px; font-weight: 600; border-radius: 5px; padding: 2px 6px; display: inline-block; }

  /* ── Active chord detail ── */
  .chord-detail { border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; border: 1.5px solid #2a2a30; }
  .chord-detail-name { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 6px; }
  .chord-detail-notes { font-size: 13px; color: #888; margin-bottom: 4px; }
  .chord-detail-type { font-size: 12px; color: #555; }

  /* ── Fretboard ── */
  .fretboard-outer { background: #111115; border-radius: 10px; padding: 12px; overflow-x: auto; }
  .fretboard-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .fret-nav-btn { background: #2a2a30; border-radius: 6px; padding: 5px 11px; font-size: 12px; color: #888; }
  .fret-nav-label { font-size: 11px; color: #555; }
  .fretboard-svg { display: block; margin: 0 auto; }

  /* ── Piano ── */
  .piano-wrap { overflow-x: auto; }

  /* ── Circle of fifths ── */
  .circle-wrap { display: flex; flex-direction: column; align-items: center; }
  .circle-info { margin-top: 10px; text-align: center; }
  .circle-keys { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 6px; }
  .circle-note { font-size: 13px; font-weight: 700; font-family: 'Playfair Display', serif; }
  .circle-desc { font-size: 11px; color: #555; max-width: 280px; }

  /* ── Legend ── */
  .legend { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-sq  { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── Footer ── */
  .footer { text-align: center; padding: 32px 0 0; font-size: 11px; color: #333; letter-spacing: 1px; }
  .footer span { color: #444; font-style: italic; }

  @media print {
    body { background: #fff; color: #111; }
    .card { background: #f5f5f5; border: 1px solid #ddd; }
    .nav-link { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="sub">Explorador de armonía funcional</div>
    <h1 class="serif">Explorador</h1>
    <a href="index.html" class="nav-link">
      ✏️ <span>Ir al Compositor · <strong>Armonía</strong></span>
    </a>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <!-- Tónica -->
    <div class="card" style="flex:0 0 auto">
      <div class="card-label">Tónica</div>
      <div class="tonic-wrap">
        <button class="tonic-arrow" onclick="navKey(-1)">◀</button>
        <div class="tonic-display">
          <div class="tonic-label">Nota</div>
          <div class="tonic-note" id="tonic-display">Do</div>
        </div>
        <button class="tonic-arrow" onclick="navKey(1)">▶</button>
      </div>
    </div>

    <!-- Modo -->
    <div class="card" style="flex:0 0 auto">
      <div class="card-label">Modo / Escala</div>
      <select id="mode-select" onchange="selectMode(this.value)"
        style="background:#2a2a30;border:1.5px solid #3a3a42;border-radius:8px;padding:9px 14px;color:#e8e4d9;font-size:13px;font-family:'Lato',sans-serif;outline:none;cursor:pointer;min-width:180px">
      </select>
    </div>

    <!-- Instrumento -->
    <div class="card" style="flex:0 0 auto">
      <div class="card-label">Instrumento</div>
      <div class="inst-bar" id="inst-bar"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="selectTab('harmony')"   id="tab-harmony">🎼 Armonía</button>
    <button class="tab-btn"        onclick="selectTab('instrument')" id="tab-instrument">🎸 Instrumento</button>
    <button class="tab-btn"        onclick="selectTab('circle')"     id="tab-circle">⭕ Círculo de 5ᵃˢ</button>
  </div>

  <!-- Tab content -->
  <div id="content-harmony"></div>
  <div id="content-instrument" style="display:none"></div>
  <div id="content-circle" style="display:none"></div>

  <!-- Footer -->
  <div class="footer">una idea de <span>Waviwan</span></div>

</div>
<script>
// ── Music Theory ──────────────────────────────────────────────────────────────
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_LABELS = ['Do','Do#','Re','Mib','Mi','Fa','Fa#','Sol','Lab','La','Sib','Si'];
const CIRCLE_OF_FIFTHS = ['C','G','D','A','E','B','F#','C#','G#','D#','A#','F'];
const CIRCLE_LABELS    = ['Do','Sol','Re','La','Mi','Si','Fa#','Do#','Lab','Mib','Sib','Fa'];
const RELATIVE_MINOR   = {C:'Am',G:'Em',D:'Bm',A:'F#m',E:'C#m',B:'G#m','F#':'D#m','C#':'A#m','G#':'Fm','D#':'Cm','A#':'Gm',F:'Dm'};
const REL_MIN_LABELS   = {C:'Lam',G:'Mim',D:'Sim',A:'Fa#m',E:'Do#m',B:'Sol#m','F#':'Re#m','C#':'La#m','G#':'Fam','D#':'Dom','A#':'Solm',F:'Rem'};

const MODES = {
  'Mayor (Jónico)': { intervals:[0,2,4,5,7,9,11], desc:'Feliz, brillante, estable. Base de la armonía tonal.' },
  'Dórico':         { intervals:[0,2,3,5,7,9,10],  desc:'Melancólico pero optimista. Funk, jazz, rock.' },
  'Frigio':         { intervals:[0,1,3,5,7,8,10],  desc:'Oscuro, misterioso. Flamenco, metal.' },
  'Lidio':          { intervals:[0,2,4,6,7,9,11],  desc:'Soñador, etéreo. Jazz, bandas sonoras.' },
  'Mixolidio':      { intervals:[0,2,4,5,7,9,10],  desc:'Bluesy, dominante. Blues, rock, funk.' },
  'Menor (Eólico)': { intervals:[0,2,3,5,7,8,10],  desc:'Triste, expresivo. Escala menor natural.' },
  'Locrio':         { intervals:[0,1,3,4,6,8,10],  desc:'Muy inestable. Para tensiones especiales.' },
  'Menor Armónico': { intervals:[0,2,3,5,7,8,11],  desc:'Menor con sensible. Base de la armonía clásica.' },
  'Menor Melódica': { intervals:[0,2,3,5,7,9,11],  desc:'Menor con 6° y 7° mayores. Esencial en jazz.' },
};

const CHORD_INT = { maj:[0,4,7], min:[0,3,7], dom:[0,4,7,10], dim:[0,3,6,9], aug:[0,4,8] };
const ni  = (root,iv) => NOTES[(NOTES.indexOf(root)+iv)%12];
const nl  = (note)    => NOTE_LABELS[NOTES.indexOf(note)];
const getCN = (root,q) => (CHORD_INT[q]||[]).map(i=>ni(root,i));
const getSN = (root,mode) => { const ri=NOTES.indexOf(root); return (MODES[mode]?.intervals||[]).map(i=>NOTES[(ri+i)%12]); };
const cL  = (root,q) => nl(root)+(q==='min'?'m':q==='dom'?'7':q==='dim'?'°':q==='aug'?'+':'');

const INSTRUMENTS = {
  guitar:  { name:'Guitarra', icon:'🎸', strings:['E','A','D','G','B','E'], frets:15 },
  bass:    { name:'Bajo',     icon:'🎵', strings:['E','A','D','G'],         frets:15 },
  ukulele: { name:'Ukelele',  icon:'🪗', strings:['G','C','E','A'],         frets:12 },
  piano:   { name:'Piano',    icon:'🎹', strings:[],                        frets:0  },
};

const FNC_COLORS = {
  tonica:       { bg:'#1d3a20', bd:'#4ade80', lb:'#86efac', dot:'#4ade80' },
  subdominante: { bg:'#2a2a10', bd:'#e8b86d', lb:'#fde68a', dot:'#e8b86d' },
  dominante:    { bg:'#2a1515', bd:'#e07b7b', lb:'#fca5a5', dot:'#e07b7b' },
  tension:      { bg:'#1e1535', bd:'#a78bca', lb:'#c4b5fd', dot:'#a78bca' },
  prestamo:     { bg:'#0f2020', bd:'#2dd4bf', lb:'#99f6e4', dot:'#2dd4bf' },
};
const FN_LABELS = { tonica:'Tónica', subdominante:'Subdominante', dominante:'Dominante', tension:'Tensión', prestamo:'Préstamo' };

const NOTE_COLORS = {
  root:  { bg:'#3b82f6', bd:'#93c5fd' },
  chord: { bg:'#a855f7', bd:'#d8b4fe' },
  triad: { bg:'#f97316', bd:'#fdba74' },
  scale: { bg:'#22c55e', bd:'#86efac' },
};

// ── State ──────────────────────────────────────────────────────────────────────
const state = {
  root:    'C',
  mode:    'Mayor (Jónico)',
  inst:    'guitar',
  tab:     'harmony',
  progId:  'tonal',
  chordIdx: null,
  fretStart: 0,
};

// ── Progressions builder ───────────────────────────────────────────────────────
function buildProgs(root) {
  const sd = (r) => ({ root:ni(r,7), q:'dom', fn:'dominante', fl:'Dom. Sec.' });
  const d = [
    {iv:0,  q:'maj', r:'I',    fn:'tonica',       fl:'Tónica'},
    {iv:2,  q:'min', r:'ii',   fn:'subdominante', fl:'Subdominante'},
    {iv:4,  q:'min', r:'iii',  fn:'tonica',       fl:'Tónica'},
    {iv:5,  q:'maj', r:'IV',   fn:'subdominante', fl:'Subdominante'},
    {iv:7,  q:'dom', r:'V7',   fn:'dominante',    fl:'Dominante'},
    {iv:9,  q:'min', r:'vi',   fn:'tonica',       fl:'Tónica'},
    {iv:11, q:'dim', r:'vii°', fn:'dominante',    fl:'Dominante'},
  ].map(s => ({...s, root:ni(root,s.iv)}));
  const [I,ii,iii,IV,V,vi,vii] = d;

  return [
    { id:'tonal',    name:'Funciones Tonales',       sub:'Los 7 acordes de la tonalidad',
      book:'Cada acorde tiene una función: Tónica (reposo), Subdominante (tensión media), Dominante (máxima tensión). Los acordes de la misma función son intercambiables.',
      chords: d },
    { id:'251',      name:'Progresión 2–5–1',        sub:'La más usada en jazz',
      book:'El movimiento ii → V7 → I es el motor armónico del jazz. El ii genera expectativa, el V7 crea máxima tensión, y el I resuelve.',
      chords:[{...ii,fl:'2do grado'},{...V,fl:'5to grado'},{...I,fl:'1er grado'}] },
    { id:'6251',     name:'Progresión 6–2–5–1',      sub:'Extensión del 2–5–1',
      book:'El vi agrega más movimiento antes del ii. Muy común en standards de jazz.',
      chords:[{...vi,fl:'6to grado'},{...ii,fl:'2do grado'},{...V,fl:'5to grado'},{...I,fl:'1er grado'}] },
    { id:'cadencias',name:'Cadencias',               sub:'Cómo cerrar frases musicales',
      book:'Cadencia perfecta (V7→I): el cierre más contundente. Cadencia plagal (IV→I): más suave. El vii° puede reemplazar al V7.',
      chords:[{...IV,fl:'Plagal: IV→I'},{...V,fl:'Perfecta: V7→I'},{...vii,fl:'Alt: vii°→I'},{...I,fl:'Resolución'}] },
    { id:'secsec',   name:'Dominantes Secundarios',  sub:'V7 de cada acorde',
      book:'Cada acorde puede ser precedido por su propio V7. Genera color aunque no sea el centro tonal.',
      chords:[{...sd(I.root),fl:'V7/I',r:'V7/I'},{...I,fl:'I'},{...sd(IV.root),fl:'V7/IV',r:'V7/IV'},{...IV,fl:'IV'},{...sd(V.root),fl:'V7/V',r:'V7/V'},{...V,fl:'V7'}] },
    { id:'tritone',  name:'Sustituto Tritonal',      sub:'Reemplazar V7 por su S.T.',
      book:'El G7 y el Db7 comparten las notas de tensión (si y fa). Son intercambiables. Bien usado es increíble.',
      chords:[{...ii,fl:'2do grado'},{...V,fl:'Dominante'},{root:ni(V.root,6),q:'dom',fn:'tension',fl:'S.T. (±tritono)',r:'bII7'},{...I,fl:'Resolución'}] },
    { id:'prestamo', name:'Préstamo Modal',          sub:'Acordes de la tonalidad paralela',
      book:'C mayor y C menor son paralelas. Podés tomar prestados acordes del modo menor. La progresión IV – iv – I es clásica y emotiva.',
      chords:[{...I,fl:'Tónica Mayor'},{...IV,fl:'IV Mayor'},{root:IV.root,q:'min',fn:'prestamo',fl:'iv (préstamo)',r:'iv'},{...I,fl:'Tónica Mayor'}] },
  ];
}

// ── getKind for visualization ─────────────────────────────────────────────────
function getKind(note, root, scaleNotes, triadNotes, chordNotes) {
  if(!scaleNotes.includes(note)) return null;
  if(note===root) return 'root';
  if(chordNotes.length && chordNotes.includes(note)) return 'chord';
  if(triadNotes.includes(note)) return 'triad';
  return 'scale';
}

// ── Render helpers ─────────────────────────────────────────────────────────────
function renderTonicDisplay() {
  document.getElementById('tonic-display').textContent = NOTE_LABELS[NOTES.indexOf(state.root)];
  document.getElementById('tonic-display').style.color = '#e8e4d9';
}

function renderModeSelect() {
  const sel = document.getElementById('mode-select');
  sel.innerHTML = Object.entries(MODES).map(([k,m])=>
    `<option value="${k}"${state.mode===k?' selected':''}>${k}</option>`
  ).join('');
}

function renderInstBar() {
  document.getElementById('inst-bar').innerHTML = Object.entries(INSTRUMENTS).map(([k,v])=>
    `<button class="inst-btn${state.inst===k?' active':''}"
      style="${state.inst===k?'background:#e8b86d;border-color:#e8b86d':''}"
      onclick="selectInst('${k}')">${v.icon} ${v.name}</button>`
  ).join('');
}

function renderTabs() {
  ['harmony','instrument','circle'].forEach(t => {
    document.getElementById(`tab-${t}`).className = 'tab-btn' + (state.tab===t?' active':'');
    document.getElementById(`content-${t}`).style.display = state.tab===t ? '' : 'none';
  });
}

// ── Harmony Tab ───────────────────────────────────────────────────────────────
function renderHarmony() {
  const progs = buildProgs(state.root);
  const prog  = progs.find(p=>p.id===state.progId) || progs[0];
  const ac    = state.chordIdx!==null ? prog.chords[state.chordIdx] : null;
  const acn   = ac ? getCN(ac.root, ac.q) : [];
  const sn    = getSN(state.root, state.mode);
  const tn    = getCN(state.root, 'maj');

  // Prog tabs
  const progTabs = progs.map(p=>
    `<button class="prog-tab${state.progId===p.id?' active':''}" onclick="selectProg('${p.id}')">${p.name}</button>`
  ).join('');

  // Chord cards
  const cards = prog.chords.map((c,i) => {
    const fc  = FNC_COLORS[c.fn] || FNC_COLORS.tonica;
    const notes = getCN(c.root,c.q).map(n=>NOTE_LABELS[NOTES.indexOf(n)]).join('·');
    const active = state.chordIdx===i;
    return `<div class="chord-card${active?' active':''}"
      style="background:${active?fc.bg:'#111115'};border-color:${active?fc.bd:'#2a2a30'}"
      onclick="selectChord(${i})">
      <div class="cc-name" style="color:${active?'#fff':'#e8e4d9'}">${cL(c.root,c.q)}</div>
      <div class="cc-roman">${c.r||''}</div>
      <div class="cc-notes" style="color:${active?fc.lb:'#444'}">${notes}</div>
      <div class="cc-fn" style="background:${active?fc.bd+'22':'#1a1a1f'};color:${active?fc.lb:'#555'}">${c.fl}</div>
    </div>`;
  }).join('');

  // Active chord detail
  let detail = '';
  if(ac) {
    const fc = FNC_COLORS[ac.fn] || FNC_COLORS.tonica;
    const notes = getCN(ac.root,ac.q).map(n=>NOTE_LABELS[NOTES.indexOf(n)]).join('  ·  ');
    const qNames = {maj:'Mayor',min:'Menor',dom:'Dominante (7ª)',dim:'Disminuido',aug:'Aumentado'};
    detail = `<div class="chord-detail" style="border-color:${fc.bd};background:${fc.bg}">
      <div class="chord-detail-name serif" style="color:${fc.bd}">${cL(ac.root,ac.q)} <span style="font-size:12px;color:#555;font-family:'Lato',sans-serif">${ac.fl}</span></div>
      <div class="chord-detail-notes">Notas: <span style="color:#e8e4d9;letter-spacing:1px">${notes}</span></div>
      <div class="chord-detail-type">Tipo: ${qNames[ac.q]||ac.q} · Función: ${FN_LABELS[ac.fn]||ac.fn}</div>
    </div>`;
  }

  // Fretboard/Piano
  const viz = state.inst==='piano'
    ? renderPianoHTML(state.root, sn, acn)
    : renderFretboardHTML(state.root, sn, acn);

  const legendNotes = [['root','Tónica'],['chord','Acorde activo'],['triad','Tríada'],['scale','Escala']].map(([k,l])=>
    `<div class="legend-item"><div class="legend-dot" style="background:${NOTE_COLORS[k].bg};border:1px solid ${NOTE_COLORS[k].bd}"></div>${l}</div>`
  ).join('');
  const legendFn = Object.entries(FNC_COLORS).map(([fn,c])=>
    `<div class="legend-item"><div class="legend-sq" style="background:${c.bg};border:1px solid ${c.bd}"></div>${FN_LABELS[fn]||fn}</div>`
  ).join('');

  document.getElementById('content-harmony').innerHTML = `
    <div class="prog-tabs">${progTabs}</div>
    <div class="card">
      <div style="font-family:'Playfair Display',serif;font-size:16px;color:#a5b4fc;margin-bottom:3px">${prog.name}</div>
      <div style="color:#555;font-size:12px;margin-bottom:8px">${prog.sub}</div>
      <div class="prog-book">💡 ${prog.book}</div>
      <div class="chord-row">${cards}</div>
      ${detail}
      <div class="fretboard-outer">
        <div style="font-size:11px;color:#555;text-align:center;margin-bottom:8px">
          ${ac ? `Notas del acorde ${cL(ac.root,ac.q)} en el instrumento` : `Escala de ${NOTE_LABELS[NOTES.indexOf(state.root)]} en el instrumento`}
        </div>
        ${viz}
        <div class="legend">${legendNotes}</div>
      </div>
      <div class="legend" style="margin-top:12px">${legendFn}</div>
    </div>`;
}

// ── Instrument Tab ────────────────────────────────────────────────────────────
function renderInstrumentTab() {
  const sn  = getSN(state.root, state.mode);
  const acn = [];
  const viz = state.inst==='piano'
    ? renderPianoHTML(state.root, sn, acn)
    : renderFretboardHTML(state.root, sn, acn);
  const legend = [['root','Tónica'],['chord','Acorde'],['triad','Tríada'],['scale','Escala']].map(([k,l])=>
    `<div class="legend-item"><div class="legend-dot" style="background:${NOTE_COLORS[k].bg};border:1px solid ${NOTE_COLORS[k].bd}"></div>${l}</div>`
  ).join('');
  document.getElementById('content-instrument').innerHTML = `
    <div class="card">
      <div class="fretboard-outer">${viz}<div class="legend">${legend}</div></div>
    </div>`;
}

// ── Circle Tab ────────────────────────────────────────────────────────────────
function renderCircleTab() {
  const sn  = getSN(state.root, state.mode);
  const acn = state.chordIdx!==null ? getCN(buildProgs(state.root).find(p=>p.id===state.progId)?.chords[state.chordIdx]?.root||state.root,'maj') : [];
  const R=130, rMaj=95, rMin=58, cx=145, cy=145;

  const rings = CIRCLE_OF_FIFTHS.map((key,i) => {
    const a=(i/12)*2*Math.PI-Math.PI/2;
    const xM=cx+rMaj*Math.cos(a), yM=cy+rMaj*Math.sin(a);
    const xm=cx+rMin*Math.cos(a), ym=cy+rMin*Math.sin(a);
    const iS=key===state.root, iSc=sn.includes(key);
    const rm=RELATIVE_MINOR[key]||'';
    const rmLabel=REL_MIN_LABELS[key]||rm;
    return `
      <g onclick="selectRoot('${key}')" style="cursor:pointer">
        <circle cx="${xM}" cy="${yM}" r="20"
          fill="${iS?'#2a2a10':iSc?'#e8b86d22':'#1a1a1f'}"
          stroke="${iS?'#e8b86d':iSc?'#e8b86d':'#2a2a30'}"
          stroke-width="${iS?2.5:iSc?1.5:1}"/>
        <text x="${xM}" y="${yM+5}" text-anchor="middle"
          fill="${iS?'#e8b86d':iSc?'#e8e4d9':'#555'}"
          font-size="12" font-weight="${iS?'bold':'600'}"
          font-family="Playfair Display,serif">${CIRCLE_LABELS[i]}</text>
      </g>
      <g>
        <circle cx="${xm}" cy="${ym}" r="14"
          fill="${key===state.root?'#1a1020':'#111115'}"
          stroke="${key===state.root?'#a78bca':'#1a1a1f'}"
          stroke-width="1"/>
        <text x="${xm}" y="${ym+4}" text-anchor="middle"
          fill="${key===state.root?'#c4b5fd':'#444'}"
          font-size="8" font-family="Lato,sans-serif">${rmLabel}</text>
      </g>`;
  }).join('');

  const relLabel = REL_MIN_LABELS[state.root] || RELATIVE_MINOR[state.root] || '';

  document.getElementById('content-circle').innerHTML = `
    <div class="card circle-wrap">
      <svg width="290" height="290" style="display:block;margin:0 auto">
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="#111115" stroke="#2a2a30" stroke-width="1.5"/>
        <circle cx="${cx}" cy="${cy}" r="74" fill="none" stroke="#2a2a30" stroke-width="1"/>
        <circle cx="${cx}" cy="${cy}" r="40" fill="#0f0f12"/>
        <text x="${cx}" y="${cy+5}" text-anchor="middle" fill="#333" font-size="10" font-weight="bold" font-family="Lato,sans-serif">5ᵃˢ</text>
        ${rings}
      </svg>
      <div class="circle-info">
        <div class="circle-keys">
          <div class="circle-note" style="color:#e8b86d">${NOTE_LABELS[NOTES.indexOf(state.root)]} Mayor</div>
          <div style="color:#333;font-size:12px">↔</div>
          <div class="circle-note" style="color:#a78bca">${relLabel} relativa menor</div>
        </div>
        <div class="circle-desc">Anillo exterior = tonalidades mayores · Anillo interior = relativas menores · Comparten la misma armadura</div>
      </div>
    </div>`;
}

// ── Fretboard renderer ────────────────────────────────────────────────────────
function renderFretboardHTML(root, sn, acn) {
  const inst = INSTRUMENTS[state.inst];
  if(!inst || !inst.strings.length) return '';
  const VF=8, fs=state.fretStart, fe=fs+VF;
  const strings = [...inst.strings].reverse();
  const tn = getCN(root,'maj');

  const nav = `<div class="fretboard-nav">
    <button class="fret-nav-btn" onclick="navFret(-2)" ${fs===0?'style="opacity:0.3;pointer-events:none"':''}>◀ Anterior</button>
    <span class="fret-nav-label">Trastes ${fs}–${fe}</span>
    <button class="fret-nav-btn" onclick="navFret(2)" ${fs>=(inst.frets-VF)?'style="opacity:0.3;pointer-events:none"':''}>Siguiente ▶</button>
  </div>`;

  const frets = Array.from({length:VF+1},(_,i)=>fs+i);
  const CELL_W=48, CELL_H=34, STR_W=28;
  const svgW = STR_W + frets.length * CELL_W;
  const svgH = strings.length * CELL_H + 20;

  let cells = '';
  // Fret numbers
  frets.forEach((f,fi) => {
    const x = STR_W + fi*CELL_W + CELL_W/2;
    const mark = [3,5,7,9,12].includes(f);
    cells += `<text x="${x}" y="14" text-anchor="middle" font-size="11" fill="${mark?'#e8b86d':'#333'}" font-family="Lato,sans-serif">${f}${mark?'·':''}</text>`;
  });

  strings.forEach((openNote,si) => {
    const y = 20 + si*CELL_H;
    // String label
    cells += `<text x="${STR_W/2}" y="${y+CELL_H/2+4}" text-anchor="middle" font-size="11" font-weight="700" fill="${sn.includes(openNote)?'#e8b86d':'#333'}" font-family="Lato,sans-serif">${openNote}</text>`;
    // String line
    cells += `<line x1="${STR_W}" y1="${y+CELL_H/2}" x2="${svgW}" y2="${y+CELL_H/2}" stroke="#3a3a42" stroke-width="${si<2?2:1.2}"/>`;

    frets.forEach((fret,fi) => {
      const note = NOTES[(NOTES.indexOf(openNote)+fret)%12];
      const kind = getKind(note, root, sn, tn, acn);
      const x = STR_W + fi*CELL_W;
      // Fret line
      if(fi===0) cells += `<rect x="${x}" y="${y+4}" width="4" height="${CELL_H-8}" rx="2" fill="#c8a97e"/>`;
      else cells += `<line x1="${x}" y1="${y+4}" x2="${x}" y2="${y+CELL_H-4}" stroke="#2a2a30" stroke-width="1"/>`;

      if(kind) {
        const nc = NOTE_COLORS[kind];
        const cx = x + CELL_W/2, cy2 = y + CELL_H/2;
        cells += `<circle cx="${cx}" cy="${cy2}" r="11" fill="${nc.bg}" stroke="${nc.bd}" stroke-width="1.5"/>`;
        cells += `<text x="${cx}" y="${cy2+4}" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" font-family="Lato,sans-serif" style="pointer-events:none">${NOTE_LABELS[NOTES.indexOf(note)]}</text>`;
      }
    });
  });

  return `${nav}<div style="overflow-x:auto"><svg width="${svgW}" height="${svgH}" class="fretboard-svg">${cells}</svg></div>`;
}

// ── Piano renderer ────────────────────────────────────────────────────────────
function renderPianoHTML(root, sn, acn) {
  const tn=getCN(root,'maj');
  const wo=['C','D','E','F','G','A','B'],bs=[0,1,3,4,5],bn=['C#','D#','F#','G#','A#'];
  const W=38,HW=108,HB=66,BW=24,oc=[0,1];
  const tw=oc.length*7*W;
  let svg = `<svg width="${tw}" height="${HW+12}" style="display:block;margin:0 auto">`;

  oc.forEach((_,oi) => {
    wo.forEach((n,wi) => {
      const x=(oi*7+wi)*W;
      const k=getKind(n,root,sn,tn,acn);
      const nc=k?NOTE_COLORS[k]:null;
      svg += `<rect x="${x+1}" y="0" width="${W-2}" height="${HW}" rx="3"
        fill="${k?nc.bg:'#f8fafc'}" stroke="${k?nc.bd:'#94a3b8'}" stroke-width="${k?2:1}"/>`;
      svg += `<text x="${x+W/2}" y="${HW-7}" text-anchor="middle"
        fill="${k?'#fff':'#94a3b8'}" font-size="10" font-weight="${k?'bold':'normal'}"
        font-family="Lato,sans-serif">${n}</text>`;
    });
    bs.forEach((slot,bi) => {
      const x=(oi*7+slot)*W+W-BW/2;
      const note=bn[bi];
      const k=getKind(note,root,sn,tn,acn);
      const nc=k?NOTE_COLORS[k]:null;
      svg += `<rect x="${x}" y="0" width="${BW}" height="${HB}" rx="2"
        fill="${k?nc.bg:'#1e293b'}" stroke="${k?nc.bd:'#0f172a'}" stroke-width="${k?2:1}"/>`;
      if(k) svg += `<text x="${x+BW/2}" y="${HB-6}" text-anchor="middle"
        fill="#fff" font-size="8" font-weight="bold" font-family="Lato,sans-serif">${NOTE_LABELS[NOTES.indexOf(note)]}</text>`;
    });
  });

  svg += '</svg>';
  return `<div class="piano-wrap">${svg}</div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function navKey(dir) {
  const idx = NOTES.indexOf(state.root);
  state.root = NOTES[(idx+dir+12)%12];
  state.chordIdx = null;
  renderAll();
}
function selectRoot(note) {
  state.root = note;
  state.chordIdx = null;
  renderAll();
}
function selectMode(val)  { state.mode=val; state.chordIdx=null; renderAll(); }
function selectInst(key)  { state.inst=key; state.fretStart=0; renderAll(); }
function selectTab(t)     { state.tab=t; renderAll(); }
function selectProg(id)   { state.progId=id; state.chordIdx=null; renderAll(); }
function selectChord(idx) { state.chordIdx = state.chordIdx===idx ? null : idx; renderAll(); }
function navFret(dir) {
  const inst=INSTRUMENTS[state.inst];
  const VF=8;
  state.fretStart = Math.max(0, Math.min(inst.frets-VF, state.fretStart+dir));
  renderAll();
}

// ── Render all ────────────────────────────────────────────────────────────────
function renderAll() {
  renderTonicDisplay();
  renderModeSelect();
  renderInstBar();
  renderTabs();
  if(state.tab==='harmony')     renderHarmony();
  if(state.tab==='instrument')  renderInstrumentTab();
  if(state.tab==='circle')      renderCircleTab();
}

renderAll();
</script>
